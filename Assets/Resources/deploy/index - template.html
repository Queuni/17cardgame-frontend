<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="unity-webgl-responsive" content="true">
  <title>17 CardGame</title>

  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <!-- Socket.io -->
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
    }

    /* Fullscreen Unity Container */
    #unity-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000000;
    }

    /* Canvas fills browser fullscreen */
    #unity-canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    /* Loading UI */
    #loading-wrapper {
      position: absolute;
      top: 45%;
      width: 100%;
      text-align: center;
      color: #4cff4c;
      font-family: sans-serif;
      z-index: 9999;
    }

    #loading-logo {
      margin-bottom: 20px;
      font-size: 52px;
      font-weight: bold;
    }

    #loading-bar {
      width: 65%;
      height: 12px;
      background: #222;
      border-radius: 6px;
      margin: 0 auto;
    }

    #loading-bar-fill {
      width: 0%;
      height: 100%;
      background: #4cff4c;
      border-radius: 6px;
      transition: width 0.1s linear;
    }
  </style>
</head>

<body>

  <!-- Loading Screen -->
  <div id="loading-wrapper">
    <div id="loading-logo">17 Card Game</div>
    <div id="loading-bar">
      <div id="loading-bar-fill"></div>
    </div>
  </div>

  <!-- Unity Canvas -->
  <canvas id="unity-canvas" tabindex="-1"></canvas>

  <!-- Unity Loader -->
  <script src="Build/WebGL.loader.js"></script>

  <script>
    // Mobile-friendly setup
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);

      var canvas = document.querySelector("#unity-canvas");
      canvas.style.width = "100%";
      canvas.style.height = "100%";
      canvas.style.position = "fixed";
      document.body.style.textAlign = "left";
    }

    // Load Unity
    createUnityInstance(document.querySelector("#unity-canvas"), {
      dataUrl: "Build/WebGL.data.gz",
      frameworkUrl: "Build/WebGL.framework.js.gz",
      codeUrl: "Build/WebGL.wasm.gz",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "BVB Apps",
      productName: "17CardGame",
      productVersion: "1.0"
    }, (progress) => {
      // REAL loading progress
      document.getElementById("loading-bar-fill").style.width = (progress * 100) + "%";
    }).then((unityInstance) => {
      // Hide loading UI once Unity is ready
      document.getElementById("loading-wrapper").style.display = "none";
    });
  </script>

</body>

</html>
